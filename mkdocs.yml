site_name: Haxe Addons
site_url: https://paopun20.github.io/haxe-addons/
repo_name: Paopun20/haxe-addons
repo_url: https://github.com/Paopun20/haxe-addons
edit_uri: edit/main/docs/

theme:
  name: material

  icon:
    logo: simple/haxe
    repo: fontawesome/brands/github

  favicon: images/favicon.png

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link

    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top

    - search.highlight
    - search.share
    - search.suggest

    - toc.integrate

  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/lightbulb-outline
        name: Switch to system preference

plugins:
  - search

extra:
  generator: false

  status:
    new: New
    deprecated: Deprecated
    experimental: Experimental

  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Paopun20

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html

  - toc:
      permalink: true

  - pymdownx.arithmatex:
      generic: true

  - pymdownx.betterem:
      smart_enable: all

  - pymdownx.caret
  - pymdownx.details

  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji

  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      pygments_lang_class: true
      extend_pygments_lang:
        - name: haxe
          lang: haxe
          options:
            stripnl: false

  - pymdownx.inlinehilite

  - pymdownx.keys

  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: Paopun20
      repo: haxe-addons

  - pymdownx.mark

  - pymdownx.smartsymbols

  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

  - pymdownx.tasklist:
      custom_checkbox: true

  - pymdownx.tilde

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid/dist/mermaid.min.js

nav:
  - Home: index.md

  - API Reference:
      - Collections:
          - Deque: collections/deque.md

      - Math:
          - Interpolation: math/interpolation.md
          - MathTypes: math/mathtypes.md
          - Noise API: math/noise.md
          - Noise Algorithms:
              - CellularNoise: math/noises/cellular.md
              - CurlNoise: math/noises/curl.md
              - DomainWarp: math/noises/domainwarp.md
              - Fractal: math/noises/fractal.md
              - NoiseMap: math/noises/noisemap.md
              - NoiseTypes: math/noises/noisetypes.md
              - OpenSimplex2: math/noises/opensimplex2.md
              - PerlinNoise: math/noises/perlin.md
              - SimplexNoise: math/noises/simplex.md
              - ValueNoise: math/noises/value.md
              - WorleyNoise: math/noises/worley.md

      - System:
          - Path: system/path.md

      - Tools:
          - ArrayTools: tools/arraytools.md
          - FloatTools: tools/floattools.md
          - IntTools: tools/inttools.md
          - StringTools: tools/stringtools.md

      - Types:
          - BitField: types/bitfield.md
          - Int8: types/int8.md
          - UInt8: types/uint8.md

      - Useless:
          - ArrayOfBabel: useless/arrayofbabel.md
          - BlackHole: useless/blackhole.md
          - QuantumBoolean: useless/quantumboolean.md